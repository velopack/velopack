# Dependabot version updates for velopack (hard fork).
#
# Security updates (CVE-driven) are managed separately via the repo-level
# "Dependabot security updates" toggle -- they fire whenever an advisory
# lands on a dependency we use, regardless of this schedule.
#
# Version updates (non-security upgrades) fire on the schedule below.
# Weekly cadence keeps PR noise manageable for a solo-owned repo.

version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
