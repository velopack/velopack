name: Build Legacy Fixtures

on:
  workflow_dispatch:

jobs:
  osx-vpk0084:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Publish TestApp
        run: dotnet publish test/TestApp/TestApp.csproj --no-self-contained -c Release -r osx-arm64 -o publish-legacy --tl:off
      - name: Install vpk 0.0.84
        run: dotnet tool install vpk --version 0.0.84 --tool-path ./vpk-tool
      - name: Pack with vpk 0.0.84
        run: ./vpk-tool/vpk pack -u LegacyTestApp -v 1.0.0 -p publish-legacy -e TestApp -o ./releases
      - name: Upload fixture
        uses: actions/upload-artifact@v7
        with:
          name: osx-vpk0084
          path: releases/*Portable*
          retention-days: 30

  osx-vpk1298:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Publish TestApp
        run: dotnet publish test/TestApp/TestApp.csproj --no-self-contained -c Release -r osx-arm64 -o publish-legacy --tl:off
      - name: Install vpk 0.0.1298
