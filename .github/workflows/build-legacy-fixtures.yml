  linux-vpk0084:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Install AppImage dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y libfuse2 squashfs-tools
      - name: Publish TestApp
        run: dotnet publish test/TestApp/TestApp.csproj --no-self-contained -c Release -r linux-x64 -o publish-legacy --tl:off
      - name: Install vpk 0.0.84
        run: dotnet tool install vpk --version 0.0.84 --tool-path ./vpk-tool
      - name: Pack with vpk 0.0.84
        run: ./vpk-tool/vpk pack -u LegacyTestApp -v 1.0.0 -p publish-legacy -e TestApp -o ./releases
      - name: Upload fixture
        uses: actions/upload-artifact@v7
        with:
          name: linux-vpk0084
          path: releases/*.AppImage
          retention-days: 30

  linux-vpk1298:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Install AppImage dependencies
        run: |
