  windows-vpk1298:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Publish TestApp
        run: dotnet publish test/TestApp/TestApp.csproj --no-self-contained -c Release -r win-x64 -o publish-legacy --tl:off
      - name: Install vpk 0.0.1298
        run: dotnet tool install vpk --version 0.0.1298 --tool-path ./vpk-tool
      - name: Pack with vpk 0.0.1298
        run: ./vpk-tool/vpk.exe pack -u LegacyTestApp -v 1.0.0 -p publish-legacy -e TestApp.exe -o ./releases
      - name: Upload fixture
        uses: actions/upload-artifact@v7
        with:
          name: windows-vpk1298
          path: releases/*Setup*
          retention-days: 30
