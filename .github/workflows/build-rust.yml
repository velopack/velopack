name: Build Rust
on:
  workflow_call:

permissions:
  contents: read

jobs:
  windows:
    runs-on: blacksmith-8vcpu-windows-2025
    env:
      RUSTFLAGS: -C target-feature=+crt-static
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
        with:
          rust-cache: true
      - name: Install Dependencies
        run: |
          rustup component add rust-src --toolchain nightly-x86_64-pc-windows-msvc
      - name: Build Rust (x86)
        run: |
          cargo +nightly build --locked --target i686-win7-windows-msvc --features windows --release -Z build-std="core,alloc,std,panic_abort" --workspace --exclude velopack_python
          mkdir artifacts
          move target\i686-win7-windows-msvc\release\velopack_nodeffi.dll artifacts\velopack_nodeffi_win_x86_msvc.node
          move target\i686-win7-windows-msvc\release\velopack_libc.dll artifacts\velopack_libc_win_x86_msvc.dll
          move target\i686-win7-windows-msvc\release\velopack_libc.dll.lib artifacts\velopack_libc_win_x86_msvc.dll.lib
          move target\i686-win7-windows-msvc\release\velopack_libc.lib artifacts\velopack_libc_win_x86_msvc.lib
          move target\i686-win7-windows-msvc\release\velopack_wix.dll artifacts\velopack_wix_x86.dll
          copy target\i686-win7-windows-msvc\release\update.exe artifacts\update.exe
          copy target\i686-win7-windows-msvc\release\update.pdb artifacts\update.pdb
          copy target\i686-win7-windows-msvc\release\setup.exe artifacts\setup.exe
          copy target\i686-win7-windows-msvc\release\setup.pdb artifacts\setup.pdb
          copy target\i686-win7-windows-msvc\release\stub.exe artifacts\stub.exe
          copy target\i686-win7-windows-msvc\release\stub.pdb artifacts\stub.pdb
          copy target\i686-win7-windows-msvc\release\testapp.exe artifacts\testapp.exe
          copy target\i686-win7-windows-msvc\release\testapp.pdb artifacts\testapp.pdb
      - name: Build Rust (x64)
        run: |
          cargo +nightly build --locked --target x86_64-win7-windows-msvc --features windows --release -Z build-std="core,alloc,std,panic_abort" --workspace --exclude velopack_python
          move target\x86_64-win7-windows-msvc\release\velopack_nodeffi.dll artifacts\velopack_nodeffi_win_x64_msvc.node
          move target\x86_64-win7-windows-msvc\release\velopack_libc.dll artifacts\velopack_libc_win_x64_msvc.dll
          move target\x86_64-win7-windows-msvc\release\velopack_libc.dll.lib artifacts\velopack_libc_win_x64_msvc.dll.lib
          move target\x86_64-win7-windows-msvc\release\velopack_libc.lib artifacts\velopack_libc_win_x64_msvc.lib
          move target\x86_64-win7-windows-msvc\release\velopack_wix.dll artifacts\velopack_wix_x64.dll
          copy target\x86_64-win7-windows-msvc\release\update.exe artifacts\update_x64.exe
          copy target\x86_64-win7-windows-msvc\release\update.pdb artifacts\update_x64.pdb
          copy target\x86_64-win7-windows-msvc\release\setup.exe artifacts\setup_x64.exe
          copy target\x86_64-win7-windows-msvc\release\setup.pdb artifacts\setup_x64.pdb
          copy target\x86_64-win7-windows-msvc\release\stub.exe artifacts\stub_x64.exe
          copy target\x86_64-win7-windows-msvc\release\stub.pdb artifacts\stub_x64.pdb
          copy target\x86_64-win7-windows-msvc\release\testapp.exe artifacts\testapp_x64.exe
          copy target\x86_64-win7-windows-msvc\release\testapp.pdb artifacts\testapp_x64.pdb
      - name: Upload Rust Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-windows
          path: artifacts\*
          retention-days: 1
      - name: Cancel workflow if failed
        if: ${{ failure() }}
        uses: ./.github/actions/cancel-workflow

  windows-arm64:
    runs-on: windows-latest
    env:
      RUSTFLAGS: -C target-feature=+crt-static
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
        with:
          rust-cache: true
      - name: Install Dependencies
        run: |
          rustup target add aarch64-pc-windows-msvc --toolchain nightly-x86_64-pc-windows-msvc
      - name: Build Rust (arm64)
        run: |
          cargo +nightly build --locked --target aarch64-pc-windows-msvc --features windows --release --workspace --exclude velopack_python
          mkdir artifacts
          move target\aarch64-pc-windows-msvc\release\velopack_nodeffi.dll artifacts\velopack_nodeffi_win_arm64_msvc.node
          move target\aarch64-pc-windows-msvc\release\velopack_libc.dll artifacts\velopack_libc_win_arm64_msvc.dll
          move target\aarch64-pc-windows-msvc\release\velopack_libc.dll.lib artifacts\velopack_libc_win_arm64_msvc.dll.lib
          move target\aarch64-pc-windows-msvc\release\velopack_libc.lib artifacts\velopack_libc_win_arm64_msvc.lib
          move target\aarch64-pc-windows-msvc\release\velopack_wix.dll artifacts\velopack_wix_arm64.dll
          copy target\aarch64-pc-windows-msvc\release\update.exe artifacts\update_arm64.exe
          copy target\aarch64-pc-windows-msvc\release\update.pdb artifacts\update_arm64.pdb
          copy target\aarch64-pc-windows-msvc\release\setup.exe artifacts\setup_arm64.exe
          copy target\aarch64-pc-windows-msvc\release\setup.pdb artifacts\setup_arm64.pdb
          copy target\aarch64-pc-windows-msvc\release\stub.exe artifacts\stub_arm64.exe
          copy target\aarch64-pc-windows-msvc\release\stub.pdb artifacts\stub_arm64.pdb
          copy target\aarch64-pc-windows-msvc\release\testapp.exe artifacts\testapp_arm64.exe
          copy target\aarch64-pc-windows-msvc\release\testapp.pdb artifacts\testapp_arm64.pdb
      - name: Upload Rust Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-windows-arm64
          path: artifacts\*
          retention-days: 1
      - name: Cancel workflow if failed
        if: ${{ failure() }}
        uses: ./.github/actions/cancel-workflow

  linux-bins:
    strategy:
      fail-fast: false
      matrix:
        target: [x64, arm64]
        include:
          - target: x64
            rust_target: x86_64-unknown-linux-musl
          - target: arm64
            rust_target: aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev libpipewire-0.3-dev libclang-dev libgbm-dev libegl-dev libwayland-dev
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cross
          mkdir ./artifacts
      - name: Build Rust Binaries (${{ matrix.target }})
        run: |
          cross build --locked --release --target ${{ matrix.rust_target }} -p velopack_bins
          ldd ./target/${{ matrix.rust_target }}/release/update || true
          cp ./target/${{ matrix.rust_target }}/release/update ./artifacts/UpdateNix_${{ matrix.target }}
      - name: Upload Rust Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-ubuntu-bins-${{ matrix.target }}
          path: |
            artifacts/UpdateNix_${{ matrix.target }}
          retention-days: 1
      - name: Cancel workflow if failed
        if: ${{ failure() }}
        uses: ./.github/actions/cancel-workflow

  linux:
    strategy:
      fail-fast: false
      matrix:
        target: [x64, arm64]
        include:
          - target: x64
            rust_target: x86_64-unknown-linux-gnu
          - target: arm64
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev libxext-dev libxft-dev libxinerama-dev libxcursor-dev libxrender-dev libxfixes-dev libpango1.0-dev libgl1-mesa-dev libglu1-mesa-dev libpipewire-0.3-dev libclang-dev libgbm-dev libegl-dev libwayland-dev
          sudo apt-get install -y g++-aarch64-linux-gnu gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu
          mkdir ./artifacts
      - name: Build Rust (${{ matrix.target }})
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --locked --release --target ${{ matrix.rust_target }} -p velopack_nodeffi -p velopack_libc
          cp ./target/${{ matrix.rust_target }}/release/libvelopack_nodeffi.so ./artifacts/velopack_nodeffi_linux_${{ matrix.target }}_gnu.node
          cp ./target/${{ matrix.rust_target }}/release/libvelopack_libc.so ./artifacts/velopack_libc_linux_${{ matrix.target }}_gnu.so
          cp ./target/${{ matrix.rust_target }}/release/libvelopack_libc.a ./artifacts/velopack_libc_linux_${{ matrix.target }}_gnu.a
      - name: Upload Rust Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-ubuntu-libs-${{ matrix.target }}
          path: |
            artifacts/*.so
            artifacts/*.node
            artifacts/*.a
          retention-days: 1
      - name: Cancel workflow if failed
        if: ${{ failure() }}
        uses: ./.github/actions/cancel-workflow

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
        with:
          rust-cache: true
      - name: Install Dependencies
        run: |
          rustup target add x86_64-apple-darwin 
      - name: Build Rust (x64)
        run: |
          cargo build --locked --release --target x86_64-apple-darwin -p velopack_bins -p velopack_nodeffi -p velopack_libc
          otool -L ./target/x86_64-apple-darwin/release/update
      - name: Build Rust (arm64)
        run: |
          cargo build --locked --release --target aarch64-apple-darwin -p velopack_bins -p velopack_nodeffi -p velopack_libc
          otool -L ./target/aarch64-apple-darwin/release/update
      - name: Create Universal Binary
        run: |
          mkdir ./artifacts
          lipo -create -output ./artifacts/UpdateMac ./target/x86_64-apple-darwin/release/update ./target/aarch64-apple-darwin/release/update
          file ./artifacts/UpdateMac
          lipo -create -output ./artifacts/velopack_nodeffi_osx.node ./target/x86_64-apple-darwin/release/libvelopack_nodeffi.dylib ./target/aarch64-apple-darwin/release/libvelopack_nodeffi.dylib
          file ./artifacts/velopack_nodeffi_osx.node
          lipo -create -output ./artifacts/velopack_libc_osx.dylib ./target/x86_64-apple-darwin/release/libvelopack_libc.dylib ./target/aarch64-apple-darwin/release/libvelopack_libc.dylib
          file ./artifacts/velopack_libc_osx.dylib
          cp ./target/x86_64-apple-darwin/release/libvelopack_libc.a ./artifacts/velopack_libc_osx_x64_gnu.a
          cp ./target/aarch64-apple-darwin/release/libvelopack_libc.a ./artifacts/velopack_libc_osx_arm64_gnu.a
      - name: Upload Rust Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-macos
          path: artifacts/*
          retention-days: 1
      ## PYTHON WHEELS (merged here due to macos concurrency limits in github actions)
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x
      - name: Build Python wheels (aarch64)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: src/lib-python
          target: aarch64
          args: --release --out dist-aarch64
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Build Python wheels (x86_64)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: src/lib-python
          target: x86_64
          args: --release --out dist-x86_64
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload Python wheels (aarch64)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-macos-aarch64
          path: src/lib-python/dist-aarch64
          retention-days: 1
      - name: Upload Python wheels (x86_64)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-macos-x86_64
          path: src/lib-python/dist-x86_64
          retention-days: 1
      - name: Cancel workflow if failed
        if: ${{ failure() }}
        uses: ./.github/actions/cancel-workflow