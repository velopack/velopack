name: Build Tests
on:
  workflow_call:

permissions:
  id-token: write
  actions: write
  contents: read

env:
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            rust_flags: "--features windows"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - name: Check lib-rust
        run: cargo check -p velopack
      - name: Test Rust
        run: >-
          cargo llvm-cov nextest --profile ci
          ${{ matrix.rust_flags }}
          --cobertura --output-path ./test/coverage/coverage.rust.${{ matrix.os }}.xml
      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./test/coverage/coverage.rust.${{ matrix.os }}.xml
          flags: rust
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          report_type: test_results
          files: ./test/coverage/junit.*.xml
          flags: rust

  nodejs:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Setup Rust Coverage Instrumentation
        shell: bash
        run: cargo llvm-cov show-env | sed "s/='\(.*\)'/=\1/" >> "$GITHUB_ENV"
      - name: Check lib-nodejs
        working-directory: src/lib-nodejs
        run: |
          npm install
          npm run build
          npm run test
      - name: Generate Node.js Rust Coverage
        shell: bash
        run: >-
          cargo llvm-cov report
          --cobertura --output-path ./test/coverage/coverage.rust-nodejs.${{ matrix.os }}.xml
      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          directory: src/lib-nodejs/coverage
          files: ./test/coverage/coverage.rust-nodejs.${{ matrix.os }}.xml
          flags: nodejs
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          report_type: test_results
          files: ./test/coverage/junit.*.xml
          flags: nodejs

  python:
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     os: [windows-latest, ubuntu-latest, macos-latest]
    # runs-on: ${{ matrix.os }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
      - name: Install Dependencies
        working-directory: src/lib-python
        run: |
          dotnet tool update -g vpk
          pip install uv
          uv sync
      - name: Check lib-python
        working-directory: src/lib-python/test
        run: uv run python run_test.py

  vpk:
    strategy:
      fail-fast: false
      matrix:
        os: [windows, ubuntu, macos]
        include:
          - os: windows
            runner: blacksmith-4vcpu-windows-2025
          - os: ubuntu
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      VELOPACK_GITHUB_TEST_TOKEN: ${{ secrets.VELOPACK_GITHUB_TEST_TOKEN }}
      VELOPACK_B2_TEST_TOKEN: ${{ secrets.VELOPACK_B2_TEST_TOKEN }}
      VELOPACK_AZ_TEST_TOKEN: ${{ secrets.VELOPACK_AZ_TEST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
        with:
          dotnet: true
      - name: Install FUSE
        run: |
          sudo add-apt-repository universe
          sudo apt update
          sudo apt install libfuse2
        if: ${{ matrix.os == 'ubuntu' }}
      - name: Install squashfs-tools
        run: brew install squashfs
        if: ${{ matrix.os == 'macos' }}
      - name: Install dotnet-coverage
        run: dotnet tool install -g dotnet-coverage
      - name: Build .NET
        run: dotnet build -c Release
      - name: Wait for Artifacts
        uses: ./.github/actions/wait-artifact
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_wait_seconds: 900
          artifacts: rust-macos,rust-windows-bins,rust-windows-libs-x64,rust-ubuntu-bins-x64,rust-ubuntu-bins-arm64
          verbose: true
      - name: Download Rust Artifacts
        uses: actions/download-artifact@v8
        with:
          path: target/release
          pattern: rust-*
          merge-multiple: true
      - name: Build Cross-Compile Artifacts
        run: >-
          dotnet test test/Velopack.CrossCompile.Tests/Velopack.CrossCompile.Tests.csproj
          --no-build -c Release
          --filter "FullyQualifiedName~PackCrossApp"
          -l "console;verbosity=detailed;consoleLoggerParameters=ErrorsOnly"
          -l GithubActions
          -l "junit;LogFilePath=./test/coverage/junit.CrossCompile.Pack.xml"
          -- RunConfiguration.CollectSourceInformation=true
      - name: Upload Cross-Compile Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cross-${{ matrix.os }}
          path: test/artifacts/*
          retention-days: 1
      - name: Azure login
        uses: azure/login@v2
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Test Velopack.Tests
        run: >-
          dotnet test test/Velopack.Tests/Velopack.Tests.csproj
          --no-build -c Release
          -l "console;verbosity=detailed;consoleLoggerParameters=ErrorsOnly"
          -l GithubActions
          -l "junit;LogFilePath=./test/coverage/junit.Velopack.Tests.xml"
          -- RunConfiguration.CollectSourceInformation=true
      - name: Test Velopack.Packaging.Tests
        run: >-
          dotnet test test/Velopack.Packaging.Tests/Velopack.Packaging.Tests.csproj
          --no-build -c Release
          -l "console;verbosity=detailed;consoleLoggerParameters=ErrorsOnly"
          -l GithubActions
          -l "junit;LogFilePath=./test/coverage/junit.Velopack.Packaging.Tests.xml"
          -- RunConfiguration.CollectSourceInformation=true
      - name: Test Velopack.CommandLine.Tests
        run: >-
          dotnet test test/Velopack.CommandLine.Tests/Velopack.CommandLine.Tests.csproj
          --no-build -c Release
          -l "console;verbosity=detailed;consoleLoggerParameters=ErrorsOnly"
          -l GithubActions
          -l "junit;LogFilePath=./test/coverage/junit.Velopack.CommandLine.Tests.xml"
          -- RunConfiguration.CollectSourceInformation=true
      - name: Test Velopack.Pack.Tests
        run: >-
          dotnet test test/Velopack.Pack.Tests/Velopack.Pack.Tests.csproj
          --no-build -c Release
          -l "console;verbosity=detailed;consoleLoggerParameters=ErrorsOnly"
          -l GithubActions
          -l "junit;LogFilePath=./test/coverage/junit.Velopack.Pack.Tests.xml"
          -- RunConfiguration.CollectSourceInformation=true
      - name: Wait for Artifacts
        uses: ./.github/actions/wait-artifact
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'windows' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_wait_seconds: 900
          artifacts: cross-macos,cross-ubuntu,cross-windows
          verbose: true
      - name: Download Cross Artifacts
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'windows' }}
        uses: actions/download-artifact@v8
        with:
          path: test/artifacts
          pattern: cross-*
          merge-multiple: true
      - name: Test Cross-Compiled Apps
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'windows' }}
        env:
          VELOPACK_CROSS_ARTIFACTS: true
        run: >-
          dotnet test test/Velopack.CrossCompile.Tests/Velopack.CrossCompile.Tests.csproj
          --no-build -c Release
          --filter "FullyQualifiedName~RunCrossApp"
          -l "console;verbosity=detailed;consoleLoggerParameters=ErrorsOnly"
          -l GithubActions
          -l "junit;LogFilePath=./test/coverage/junit.CrossCompile.Run.xml"
          -- RunConfiguration.CollectSourceInformation=true
      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          directory: ./test/coverage
          flags: vpk
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          report_type: test_results
          files: ./test/coverage/junit.*.xml
          flags: vpk

  vpk-coverage:
    strategy:
      fail-fast: false
      matrix:
        os: [windows, macos]
        include:
          - os: windows
            runner: blacksmith-4vcpu-windows-2025
            rust_flags: "--features windows"
          - os: macos
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
        with:
          dotnet: true
      - name: Install squashfs-tools
        run: brew install squashfs
        if: ${{ matrix.os == 'macos' }}
      - name: Install dotnet-coverage
        run: dotnet tool install -g dotnet-coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Setup Rust Coverage Instrumentation
        shell: bash
        run: cargo llvm-cov show-env | sed "s/='\(.*\)'/=\1/" >> "$GITHUB_ENV"
      - name: Build Instrumented Rust Binaries
        run: cargo build -p velopack_bins ${{ matrix.rust_flags }}
      - name: Test Velopack.Pack.Tests
        run: >-
          dotnet test test/Velopack.Pack.Tests/Velopack.Pack.Tests.csproj
          -l "console;verbosity=detailed;consoleLoggerParameters=ErrorsOnly"
          -- RunConfiguration.CollectSourceInformation=true
      - name: Generate Rust Integration Coverage
        shell: bash
        run: >-
          cargo llvm-cov report
          --cobertura --output-path ./test/coverage/coverage.rust-integration.${{ matrix.os }}.xml
      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          directory: ./test/coverage
          flags: vpk-coverage
